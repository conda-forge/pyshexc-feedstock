{% set name = "PyShExC" %}
{% set version = "0.10.3.post1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | lower }}-{{ version }}.tar.gz
  sha256: 80d9d067c80af9a796e3c1c47d2207edf2e9a9fc39d3ca0ce5dd2019334ea915

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pbr
    - pip
  run:
    - python >={{ python_min }}
    - antlr4-python3-runtime >=4.9.3,<4.10.dev0
    - chardet
    - jsonasobj >=1.2.1
    - pyjsg >=0.11.10
    - rdflib-shim
    - shexjsg >=0.8.1

test:
  imports:
    - pyshexc
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/shexSpec/grammar-python-antlr
  summary: PyShExC - Python ShEx compiler
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jfy133
